services:
  graphglot:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      target: test
    command: tail -f /dev/null
    ports:
      - "8000:8000"
    volumes:
      - ..:/graphglot
      - ${PWD}/.claude:/root/.claude
    depends_on:
      neo4j:
        condition: service_healthy
  neo4j:
    image: neo4j:2026-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/testpassword
      NEO4J_db_query_default__language: CYPHER_25
      # NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "testpassword", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
