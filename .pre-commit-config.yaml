repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.11.6
    hooks:
      # Run the linter.
      - id: ruff
        types_or: [python, pyi]
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
        types_or: [python, pyi]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0 # Use the latest version
    hooks:
      - id: check-yaml
        exclude: mkdocs\.yml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0 # Use the latest version
    hooks:
      - id: python-check-mock-methods # Ensures you're using the correct mock methods
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout
  - repo: local
    hooks:
      - id: no-bnf
        name: check for BNF definitions
        entry: python scripts/bnf.py check-staged
        language: python
        files: ^graphglot/ast/expressions\.py$
        stages: [pre-commit]
